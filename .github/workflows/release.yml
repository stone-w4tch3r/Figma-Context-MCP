name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for npm OIDC trusted publishing

jobs:
  release-please:
    if: ${{ github.repository_owner == 'stone-w4tch3r' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds
        if: ${{ steps.release.outputs.release_created }}

      - name: Install dependencies
        run: pnpm install
        if: ${{ steps.release.outputs.release_created }}

      - name: Type check
        run: pnpm type-check
        if: ${{ steps.release.outputs.release_created }}

      - name: Build
        run: pnpm build
        if: ${{ steps.release.outputs.release_created }}

      # Trusted publishing via OIDC — no NODE_AUTH_TOKEN needed.
      # The npm CLI auto-detects the OIDC environment and exchanges the
      # id-token for a short-lived publish credential. Provenance is
      # generated automatically.
      - name: Publish to npm
        run: npm publish --no-git-checks
        env:
          NODE_ENV: production
        if: ${{ steps.release.outputs.release_created }}
